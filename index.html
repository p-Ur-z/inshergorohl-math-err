<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>inshergorohl-math-err</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        position: relative;
        font-family: system-ui, "Segoe UI", "Roboto", sans-serif;
      }
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 0;
        pointer-events: none;
      }
      .content {
        position: relative;
        z-index: 2;
        max-width: 680px;
        margin: 20vh auto;
        background: rgba(255, 255, 255, 0.6);
        padding: 2.5rem 3rem;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 480;
        color: #1a4c6e;
        margin-bottom: 1rem;
      }
      a {
        text-decoration: none;
        color: #2c6b8f;
        font-size: 1.2rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      a:hover {
        opacity: 0.6;
      }
      .footer {
        margin-top: 2rem;
        font-size: 0.7rem;
        padding-top: 0.8rem;
      }
      @media (max-width: 720px) {
        .content {
          margin: 15vh 1.2rem;
          padding: 1.8rem 1.5rem;
        }
        h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bgCanvas"></canvas>
    <div class="content">
      <h1>Inshergorohl Math Err</h1>
      <a href="flux/flux.html" target="_blank">Flux v1.4</a>
      <div class="footer"></div>
    </div>
    <script>
      (function () {
        const canvas = document.getElementById("bgCanvas");
        let ctx = canvas.getContext("2d");

        // 直接使用斜率 k = 2.5 ( > 1 )
        // 直线方程: y = k * x + b
        const K = 2.5;
        const BAND_COUNT = 5;

        // 5个纯蓝色（从深到浅）
        const COLORS = ["#87c2f5", "#9eceff", "#b5dbff", "#cce6ff", "#e0f0ff"];

        let width, height;

        // 对于点 (x,y)，计算 b = y - K*x
        function getB(x, y) {
          return y - K * x;
        }

        // 获取屏幕四个角的 b 值范围，等分为5段
        function getBandRange() {
          const corners = [
            [0, 0],
            [width, 0],
            [width, height],
            [0, height],
          ];
          let minB = Infinity,
            maxB = -Infinity;
          for (let [x, y] of corners) {
            const b = getB(x, y);
            if (b < minB) minB = b;
            if (b > maxB) maxB = b;
          }
          const total = maxB - minB;
          const bandWidth = total / BAND_COUNT;
          return { start: minB, bandWidth };
        }

        function render() {
          if (!ctx || width === 0 || height === 0) return;

          const range = getBandRange();
          const imgData = ctx.getImageData(0, 0, width, height);
          const data = imgData.data;

          for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
              const b = getB(x, y);
              let idx = Math.floor((b - range.start) / range.bandWidth);
              if (idx < 0) idx = 0;
              if (idx >= BAND_COUNT) idx = BAND_COUNT - 1;
              const color = COLORS[idx];
              const p = (y * width + x) * 4;
              data[p] = parseInt(color.slice(1, 3), 16);
              data[p + 1] = parseInt(color.slice(3, 5), 16);
              data[p + 2] = parseInt(color.slice(5, 7), 16);
              data[p + 3] = 255;
            }
          }
          ctx.putImageData(imgData, 0, 0);
        }

        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
          render();
        }

        window.addEventListener("resize", resize);
        resize();
      })();
    </script>
  </body>
</html>
