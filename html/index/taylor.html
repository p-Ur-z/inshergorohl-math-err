<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>泰勒展开</title>
  </head>
  <body>
    <h1>泰勒展开</h1>

    <div class="card">
      <select id="func">
        <option value="sin">sin(x)</option>
        <option value="cos">cos(x)</option>
        <option value="tan">tan(x)</option>
        <option value="arcsin">arcsin(x)</option>
        <option value="Si">Si(x)</option>
        <option value="Ci" selected>Ci(x)</option>
        <option value="Ei">Ei(x)</option>
        <option value="Li">Li(x)</option>
        <option value="erf">erf(x)</option>
        <option value="exp">exp(x)</option>
      </select>

      <input id="x0" placeholder="请输入自变量 x₀" value="1" />
      <button onclick="calc()">计算</button>
      <div id="out" class="result">结果将显示在这里</div>
    </div>

    <a class="back" href="index.html">返回主页</a>

    <script>
      /* ========= 特殊函数 ========= */
      const gamma = 0.5772156649015329;
      const factorial = (k) => (k <= 1 ? 1 : k * factorial(k - 1));

      function Si(x) {
        let s = 0;
        for (let n = 0; n < 20; n++)
          s +=
            (Math.pow(-1, n) * Math.pow(x, 2 * n + 1)) /
            ((2 * n + 1) * factorial(2 * n + 1));
        return s;
      }

      function Ci(x) {
        let s = 0;
        for (let n = 1; n < 20; n++)
          s +=
            (Math.pow(-1, n) * Math.pow(x, 2 * n)) / (2 * n * factorial(2 * n));
        return gamma + Math.log(x) + s;
      }

      function Ei(x) {
        let s = 0;
        for (let n = 1; n < 20; n++) s += Math.pow(x, n) / (n * factorial(n));
        return gamma + Math.log(Math.abs(x)) + s;
      }

      function Li(x) {
        return Ei(Math.log(x));
      }

      function erf(x) {
        let s = 0;
        for (let n = 0; n < 20; n++)
          s +=
            (Math.pow(-1, n) * Math.pow(x, 2 * n + 1)) /
            (factorial(n) * (2 * n + 1));
        return (2 / Math.sqrt(Math.PI)) * s;
      }
      /* ============================= */

      function calc() {
        const name = func.value;
        const x = parseFloat(x0.value);

        if (isNaN(x)) {
          out.innerText = "error: 请输入有效数字";
          return;
        }

        let result;
        switch (name) {
          case "Si":
            result = Si(x);
            break;
          case "Ci":
            result = Ci(x);
            break;
          case "Ei":
            result = Ei(x);
            break;
          case "Li":
            result = Li(x);
            break;
          case "erf":
            result = erf(x);
            break;
          default:
            result = Math[name](x);
        }

        out.innerText = `${name}(${x}) = ${result.toFixed(8)}`;
      }
    </script>
  </body>
</html>
