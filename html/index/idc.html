<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蒙特卡洛积分</title>
    <style>
            .header {
              text-align: center;
              margin-bottom: 28px;
              padding-bottom: 20px;
              border-bottom: 1px solid #f0f0f0;
            }

            .title {
              font-size: 20px;
              font-weight: 600;
              color: #1a1a1a;
              margin: 0 0 6px 0;
              letter-spacing: -0.3px;
            }

            .subtitle {
              font-size: 14px;
              color: #666;
              margin: 0;
              font-weight: 400;
            }

            .form-group {
              margin-bottom: 20px;
            }

            .input,
            .select {
              width: 100%;
              padding: 12px 14px;
              border: 1px solid #ddd;
              border-radius: 8px;
              font-size: 14px;
              background: #fff;
              transition: all 0.2s ease;
              box-sizing: border-box;
              color: #333;
            }

            .input:focus,
            .select:focus {
              outline: none;
              border-color: #4a90e2;
              box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
            }

            .params-grid {
              display: grid;
              grid-template-columns: repeat(2, 1fr);
              gap: 12px;
              margin-bottom: 20px;
            }

            .btn {
              width: 100%;
              padding: 14px;
              border: none;
              border-radius: 8px;
              font-size: 15px;
              font-weight: 500;
              cursor: pointer;
              transition: all 0.2s ease;
              margin-top: 8px;
              letter-spacing: 0.2px;
            }

            .btn-primary {
              background: #1a73e8;
              color: white;
              box-shadow: 0 2px 8px rgba(26, 115, 232, 0.25);
            }

            .btn-primary:hover {
              background: #1669d6;
              box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            }

            .btn-back {
              background: #1a73e8;
              color: white;
              box-shadow: 0 2px 8px rgba(26, 115, 232, 0.25);
              margin-top: 12px;
            }

            .btn-back:hover {
              background: #1669d6;
              box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            }

            .result {
              margin-top: 24px;
              padding: 16px;
              background: #f8f9fa;
              border-radius: 8px;
              border: 1px solid #eee;
              font-family: "SF Mono", Monaco, "Courier New", monospace;
              font-size: 13px;
              line-height: 1.6;
              color: #2d3748;
              white-space: pre-wrap;
              word-break: break-all;
              min-height: 80px;
            }
      w
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h1 class="title">蒙特卡洛积分</h1>
        <p class="subtitle">圆、球的积分随机撒点法</p>
      </div>

      <div class="form-group">
        <label class="label">被积函数 f(x, y, z)</label>
        <input type="text" class="input" id="func" value="x*x + y*y + z*z" />
      </div>

      <div class="form-group">
        <label class="label">积分区域</label>
        <select class="select" id="region">
          <option value="circle">圆形区域 (x² + y² ≤ R²)</option>
          <option value="ellipse">椭圆区域 (x²/a² + y²/b² ≤ 1)</option>
          <option value="cylinder">圆柱体 (x² + y² ≤ R², z∈[z₀,z₁])</option>
          <option value="sphere">球体 (x² + y² + z² ≤ R²)</option>
        </select>
      </div>

      <div class="params-grid">
        <div class="form-group">
          <label class="label">R</label>
          <input type="number" class="input" id="R" value="1" step="0.1" />
        </div>
        <div class="form-group">
          <label class="label">a</label>
          <input type="number" class="input" id="a" value="2" step="0.1" />
        </div>
        <div class="form-group">
          <label class="label">b</label>
          <input type="number" class="input" id="b" value="1" step="0.1" />
        </div>
        <div class="form-group">
          <label class="label">z₀</label>
          <input type="number" class="input" id="z0" value="0" step="0.1" />
        </div>
      </div>

      <div class="form-group">
        <label class="label">z₁</label>
        <input type="number" class="input" id="z1" value="1" step="0.1" />
      </div>

      <button class="btn btn-primary" onclick="compute()">开始计算</button>
      <button class="btn btn-back" onclick="location.href = 'index.html'">
        返回主界面
      </button>

      <div class="result" id="result">点击"开始计算"查看结果</div>
    </div>

    <script>
      function compute() {
        const f = document.getElementById("func").value;
        const r = document.getElementById("region").value;
        const R = Number(document.getElementById("R").value);
        const a = Number(document.getElementById("a").value);
        const b = Number(document.getElementById("b").value);
        const z0 = Number(document.getElementById("z0").value);
        const z1 = Number(document.getElementById("z1").value);

        const N = 800000;
        let inside = 0,
          sum = 0;

        const result = document.getElementById("result");
        result.textContent = "计算中...";

        setTimeout(() => {
          for (let i = 0; i < N; i++) {
            let x = Math.random() * 2 - 1;
            let y = Math.random() * 2 - 1;
            let z = Math.random() * 2 - 1;
            let ok = false;

            if (r === "circle") ok = x * x + y * y <= R * R;
            if (r === "ellipse")
              ok = (x * x) / (a * a) + (y * y) / (b * b) <= 1;
            if (r === "cylinder")
              ok = x * x + y * y <= R * R && z >= z0 && z <= z1;
            if (r === "sphere") ok = x * x + y * y + z * z <= R * R;

            if (ok) {
              inside++;
              try {
                sum += eval(f);
              } catch (e) {
                result.textContent = "函数解析错误：" + e.message;
                return;
              }
            }
          }

          let vol =
            r === "circle"
              ? Math.PI * R * R
              : r === "ellipse"
                ? Math.PI * a * b
                : r === "cylinder"
                  ? Math.PI * R * R * (z1 - z0)
                  : r === "sphere"
                    ? (4 / 3) * Math.PI * R * R * R
                    : 1;

          const result = (vol * sum) / inside;
          const error =
            (Math.abs(
              result - (r === "sphere" ? (3 / 5) * Math.PI * R ** 5 : 0),
            ) /
              (r === "sphere" ? (3 / 5) * Math.PI * R ** 5 : 1)) *
            100;

          result.textContent =
            `计算结果\n` +
            `采样点数：${N.toLocaleString()}\n` +
            `有效样本：${inside.toLocaleString()} (${((inside / N) * 100).toFixed(1)}%)\n` +
            `积分结果：${result.toFixed(8)}\n` +
            `相对误差：${error.toFixed(4)}%\n` +
            `区域：${document.getElementById("region").options[document.getElementById("region").selectedIndex].text}`;
        }, 50);
      }
    </script>
  </body>
</html>
