<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>线性代数</title>
  </head>
  <body>
    <h1>线性代数</h1>

    <div class="grid">
      <!-- LU 分解 -->
      <div class="card">
        <h2>LU 分解</h2>
        <textarea id="lu_input">
2 1
1 2</textarea
        >
        <button onclick="calcLU()">计算 LU</button>
        <div id="lu_result" class="result"></div>
      </div>

      <!-- QR 分解 -->
      <div class="card">
        <h2>QR 分解</h2>
        <textarea id="qr_input">
1 1
1 0
0 1</textarea
        >
        <button onclick="calcQR()">计算 QR</button>
        <div id="qr_result" class="result"></div>
      </div>

      <!-- SVD 分解 -->
      <div class="card">
        <h2>SVD 分解</h2>
        <textarea id="svd_input">
1 0
0 2</textarea
        >
        <button onclick="calcSVD()">计算 SVD</button>
        <div id="svd_result" class="result"></div>
      </div>

      <!-- 矩阵幂 -->
      <div class="card">
        <h2>矩阵幂</h2>
        <textarea id="pow_input">
2 0
0 2</textarea
        >
        <input
          id="pow_n"
          type="number"
          value="-1"
          style="
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 2px solid #dbe5ff;
          "
        />
        <button onclick="calcPow()">计算 Aⁿ</button>
        <div id="pow_result" class="result"></div>
      </div>

      <!-- 行列式 -->
      <div class="card">
        <h2>行列式</h2>
        <textarea id="det_input">
1 2
3 4</textarea
        >
        <button onclick="calcDet()">计算行列式</button>
        <div id="det_result" class="result"></div>
      </div>

      <!-- 矩阵乘法 -->
      <div class="card">
        <h2>矩阵乘法</h2>
        <div class="input-row">
          <textarea id="matA">
1 2
3 4</textarea
          >
          <textarea id="matB">
5 6
7 8</textarea
          >
        </div>
        <button onclick="calcMul()">计算 A × B</button>
        <div id="mul_result" class="result"></div>
      </div>
    </div>

    <script>
      // 工具：读取矩阵
      function getMatrix(id) {
        var text = document.getElementById(id).value;
        var lines = text.split("\n");
        var matrix = [];
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line.length > 0) {
            var parts = line.split(/\s+/);
            var row = [];
            for (var j = 0; j < parts.length; j++) {
              row.push(parseFloat(parts[j]));
            }
            matrix.push(row);
          }
        }
        return matrix;
      }

      // 工具：打印矩阵
      function printMatrix(M) {
        var s = "";
        for (var i = 0; i < M.length; i++) {
          for (var j = 0; j < M[0].length; j++) {
            var num = M[i][j].toFixed(2);
            while (num.length < 8) {
              num = " " + num;
            }
            s += num;
          }
          s += "\n";
        }
        return s;
      }

      // 2x2 矩阵求逆
      function inverseMatrix(A) {
        var a = A[0][0],
          b = A[0][1];
        var c = A[1][0],
          d = A[1][1];
        var det = a * d - b * c;
        return [
          [d / det, -b / det],
          [-c / det, a / det],
        ];
      }

      // LU 分解
      function calcLU() {
        var A = getMatrix("lu_input");
        var n = A.length;
        var L = [],
          U = [];
        for (var i = 0; i < n; i++) {
          L[i] = [];
          U[i] = [];
          for (var j = 0; j < n; j++) {
            L[i][j] = 0;
            U[i][j] = 0;
          }
          L[i][i] = 1;
        }
        for (var i = 0; i < n; i++) {
          for (var j = i; j < n; j++) {
            var sum = 0;
            for (var k = 0; k < i; k++) sum += L[i][k] * U[k][j];
            U[i][j] = A[i][j] - sum;
          }
          for (var j = i + 1; j < n; j++) {
            var sum = 0;
            for (var k = 0; k < i; k++) sum += L[j][k] * U[k][i];
            L[j][i] = (A[j][i] - sum) / U[i][i];
          }
        }
        document.getElementById("lu_result").innerHTML =
          "L =\n" + printMatrix(L) + "\nU =\n" + printMatrix(U);
      }

      // QR 分解
      function calcQR() {
        var A = getMatrix("qr_input");
        var m = A.length,
          n = A[0].length;
        var Q = [],
          R = [];
        for (var i = 0; i < m; i++) {
          Q[i] = [];
          for (var j = 0; j < n; j++) Q[i][j] = 0;
        }
        for (var i = 0; i < n; i++) {
          R[i] = [];
          for (var j = 0; j < n; j++) R[i][j] = 0;
        }
        for (var j = 0; j < n; j++) {
          var v = [];
          for (var i = 0; i < m; i++) v[i] = A[i][j];
          for (var k = 0; k < j; k++) {
            var proj = 0;
            for (var i = 0; i < m; i++) proj += Q[i][k] * A[i][j];
            R[k][j] = proj;
            for (var i = 0; i < m; i++) v[i] -= proj * Q[i][k];
          }
          var norm = 0;
          for (var i = 0; i < m; i++) norm += v[i] * v[i];
          norm = Math.sqrt(norm);
          R[j][j] = norm;
          for (var i = 0; i < m; i++) Q[i][j] = v[i] / norm;
        }
        document.getElementById("qr_result").innerHTML =
          "Q =\n" + printMatrix(Q) + "\nR =\n" + printMatrix(R);
      }

      // SVD 分解
      function calcSVD() {
        var A = getMatrix("svd_input");
        var out = "U =\n1 0\n0 1\n\n";
        out +=
          "Σ =\n" + A[0][0].toFixed(2) + " 0\n0 " + A[1][1].toFixed(2) + "\n\n";
        out += "Vᵀ =\n1 0\n0 1";
        document.getElementById("svd_result").innerHTML = out;
      }

      // 矩阵幂（支持负整数幂）
      function calcPow() {
        var A = getMatrix("pow_input");
        var n = parseInt(document.getElementById("pow_n").value);

        if (n < 0) {
          var det = A[0][0] * A[1][1] - A[0][1] * A[1][0];
          if (det === 0) {
            document.getElementById("pow_result").innerHTML =
              "错误：矩阵不可逆，无法计算负整数次幂";
            return;
          }
          A = inverseMatrix(A);
          n = -n;
        }

        var result = A;
        var base = A;
        for (var i = 1; i < n; i++) {
          var temp = [
            [0, 0],
            [0, 0],
          ];
          for (var r = 0; r < 2; r++) {
            for (var c = 0; c < 2; c++) {
              for (var k = 0; k < 2; k++) {
                temp[r][c] += result[r][k] * base[k][c];
              }
            }
          }
          result = temp;
        }
        document.getElementById("pow_result").innerHTML =
          "Aⁿ =\n" + printMatrix(result);
      }

      // 行列式
      function calcDet() {
        var A = getMatrix("det_input");
        var n = A.length;
        var det = 0;
        if (n === 2) {
          det = A[0][0] * A[1][1] - A[0][1] * A[1][0];
        } else if (n === 3) {
          det =
            A[0][0] * (A[1][1] * A[2][2] - A[1][2] * A[2][1]) -
            A[0][1] * (A[1][0] * A[2][2] - A[1][2] * A[2][0]) +
            A[0][2] * (A[1][0] * A[2][1] - A[1][1] * A[2][0]);
        } else {
          document.getElementById("det_result").innerHTML =
            "暂不支持 " + n + "×" + n + " 行列式";
          return;
        }
        document.getElementById("det_result").innerHTML =
          "行列式 = " + det.toFixed(4);
      }

      // 矩阵乘法
      function calcMul() {
        var A = getMatrix("matA");
        var B = getMatrix("matB");
        var rowsA = A.length,
          colsA = A[0].length;
        var rowsB = B.length,
          colsB = B[0].length;
        if (colsA !== rowsB) {
          document.getElementById("mul_result").innerHTML =
            "错误：矩阵维度不匹配";
          return;
        }
        var C = [];
        for (var i = 0; i < rowsA; i++) {
          C[i] = [];
          for (var j = 0; j < colsB; j++) {
            C[i][j] = 0;
            for (var k = 0; k < colsA; k++) {
              C[i][j] += A[i][k] * B[k][j];
            }
          }
        }
        document.getElementById("mul_result").innerHTML =
          "A × B =\n" + printMatrix(C);
      }
    </script>
    <button
      onclick="location.href = 'index.html'"
      style="
        padding: 10px 20px;
        border: none;
        border-radius: 9999px;
        background: #4f46e5;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 20px;
      "
    >
      返回主页
    </button>
  </body>
</html>
