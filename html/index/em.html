<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>欧拉折线法</title>
    <link rel="stylesheet" href="../styles/body.css" />
    <link rel="stylesheet" href="../styles/headline.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/input.css" />
    <link rel="stylesheet" href="../styles/lable.css" />
    <link rel="stylesheet" href="../styles/button.css" />
    <link rel="stylesheet" href="../styles/result.css" />
    <link rel="stylesheet" href="../styles/back_btn.css" />
  </head>

  <body>
    <h1>欧拉折线法</h1>

    <div class="card">
      <label>微分方程 dy/dx = f(x, y)</label>
      <input id="func" value="x + y" placeholder="例如：x + y 或 x*y" />

      <label>初始条件 x₀</label>
      <input id="x0" type="number" value="0" />

      <label>初始条件 y₀</label>
      <input id="y0" type="number" value="1" />

      <label>步长 h</label>
      <input id="h" type="number" value="0.1" step="0.01" />

      <label>终点 xₙ</label>
      <input id="xn" type="number" value="1" />

      <button onclick="calcEuler()">开始计算</button>

      <div id="result" class="result"></div>
    </div>

    <button class="back-btn" onclick="location.href = 'index.html'">
      返回主页
    </button>

    <script>
      function calcEuler() {
        try {
          var f = new Function(
            "x",
            "y",
            "return " + document.getElementById("func").value + ";",
          );
          var x0 = parseFloat(document.getElementById("x0").value);
          var y0 = parseFloat(document.getElementById("y0").value);
          var h = parseFloat(document.getElementById("h").value);
          var xn = parseFloat(document.getElementById("xn").value);

          var x = x0;
          var y = y0;
          var steps = Math.round((xn - x0) / h);
          var output = "x\t\t| y\n";
          output += "--------------------\n";
          output += x.toFixed(4) + "\t| " + y.toFixed(6) + "\n";

          for (var i = 0; i < steps; i++) {
            y = y + h * f(x, y);
            x = x + h;
            output += x.toFixed(4) + "\t| " + y.toFixed(6) + "\n";
          }

          document.getElementById("result").innerText = output;
        } catch (e) {
          document.getElementById("result").innerText =
            "错误：请输入有效的函数表达式（如 x + y）。";
        }
      }
    </script>
  </body>
</html>
