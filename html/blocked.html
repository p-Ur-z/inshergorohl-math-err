<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Access Denied</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0a0a0a;
        color: #f87171;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
        padding: 20px;
    }
    h1 { font-size: 48px; margin-bottom: 20px; }
    p { color: #888; max-width: 600px; line-height: 1.6; }
    code { background: #222; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
    <h1>🚫 ACCESS DENIED</h1>
    <p>检测到异常高频点击行为。</p>
    <p>您的访问已被记录并阻断。</p>
    <p><code>Error Code: RATE_LIMIT_EXCEEDED (50+ clicks)</code></p>
    <button onclick="localStorage.removeItem('flux_blocked'); alert('解封成功！'); location.reload();" style="position:fixed; bottom:60px; right:10px; opacity:0.1; cursor:pointer;">
    紧急重置
</button>
</body>
</html>
