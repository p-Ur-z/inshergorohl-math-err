<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向量场曲线积分 Logo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        .logo-container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* 外环 */
        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #4f46e5;
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(79, 70, 229, 0.5),
                inset 0 0 20px rgba(79, 70, 229, 0.1);
        }

        /* 内圆 */
        .inner-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #0f172a 0%, #1e293b 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* SVG 容器 */
        .curve-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* 积分路径曲线 */
        .integral-path {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px rgba(79, 70, 229, 0.7));
        }

        /* 向量箭头 */
        .vector-arrow {
            fill: #fbbf24;
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.8));
        }

        /* 积分符号 */
        .integral-symbol {
            position: absolute;
            font-size: 72px;
            font-weight: bold;
            color: #4f46e5;
            text-shadow: 0 0 15px rgba(79, 70, 229, 0.8);
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        /* 向量 F 标签 */
        .vector-label {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 底部文字 */
        .logo-text {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: #94a3b8;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 动态光点 */
        .glow-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 15px #fbbf24;
            animation: moveAlongPath 4s linear infinite;
        }

        @keyframes moveAlongPath {
            0% {
                offset-distance: 0%;
            }
            100% {
                offset-distance: 100%;
            }
        }
    </style>
</head>
<body>

<div class="logo-container">
    <!-- 积分符号 -->
    <div class="integral-symbol">∫</div>
    
    <!-- 向量 F 标签 -->
    <div class="vector-label">F</div>
    
    <!-- 外环 -->
    <div class="outer-ring"></div>
    
    <!-- 内圆 -->
    <div class="inner-circle">
        <!-- SVG 曲线 -->
        <svg class="curve-container" viewBox="0 0 200 200">
            <!-- 渐变定义 -->
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4f46e5" />
                    <stop offset="100%" stop-color="#7c73ff" />
                </linearGradient>
                
                <!-- 路径动画定义 -->
                <path id="motionPath" d="M 40,160 C 60,100 140,100 160,40" fill="none" />
            </defs>
            
            <!-- 积分路径曲线 -->
            <path class="integral-path" d="M 40,160 C 60,100 140,100 160,40" />
            
            <!-- 向量箭头 -->
            <polygon class="vector-arrow" points="155,35 165,45 155,55" />
            
            <!-- 动态光点 -->
            <circle class="glow-dot" cx="0" cy="0" r="4">
                <animateMotion dur="4s" repeatCount="indefinite">
                    <mpath href="#motionPath"/>
                </animateMotion>
            </circle>
        </svg>
    </div>
    
    <!-- 底部文字 -->
    <div class="logo-text">Vector Field Line Integral</div>
</div>

</body>
</html>
