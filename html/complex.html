<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flux · Complex</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a1a1a;
    --sub: #5a6b82;
    --line: #d1d9e6;
    --teal: #14b8a6;
    --gradient: linear-gradient(90deg, #3b82f6, #8b5cf6);
}

* { box-sizing: border-box; }

body {
    margin: 0 auto;
    max-width: 820px;
    padding: 40px 24px;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ===== Header ===== */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 36px;
}

.back {
    font-size: 14px;
    color: var(--sub);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
}

h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
}

.subtitle {
    font-size: 13px;
    color: var(--sub);
}

/* ===== Card ===== */
.card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--line);
    padding: 28px;
    margin-bottom: 24px;
}

/* ===== Inputs ===== */
.row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

input {
    flex: 1;
    min-width: 140px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    font-size: 14px;
    outline: none;
}

input:focus {
    border-color: var(--teal);
}

/* ===== Buttons ===== */
.btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
}

.primary {
    background: var(--gradient);
    color: white;
}

.secondary {
    background: #f1f5f9;
    color: var(--text);
}

button:hover {
    opacity: 0.9;
}

/* ===== Result ===== */
.result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 10px;
    background: #f0fdfa;
    border: 1px solid #99f6e4;
    font-size: 14px;
    line-height: 1.8;
}

code {
    background: #e0f2fe;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
}

footer {
    text-align: center;
    margin-top: 60px;
    font-size: 13px;
    color: var(--sub);
}
</style>
</head>

<body>

<header>
    <div>
        <a href="index.html" class="back">← 返回主页</a>
        <h1>Complex · 复数计算</h1>
        <div class="subtitle">支持加减乘除、共轭、模长与坐标转换</div>
    </div>
</header>

<div class="card">
    <div class="row">
        <input id="re" type="number" step="any" placeholder="实部 a">
        <input id="im" type="number" step="any" placeholder="虚部 b">
    </div>

    <div class="btn-row">
        <button class="primary" onclick="calc('conj')">共轭</button>
        <button class="primary" onclick="calc('mod')">模长</button>
        <button class="primary" onclick="calc('arg')">辐角</button>
        <button class="secondary" onclick="clearAll()">清空</button>
    </div>

    <div id="out" class="result" style="display:none;"></div>
</div>

<div class="card">
    <div class="row">
        <input id="r" type="number" step="any" placeholder="模长 r">
        <input id="theta" type="number" step="any" placeholder="角度 θ (°)">
    </div>
    <button class="primary" onclick="polarToRect()">转换为直角坐标</button>
</div>

<script>
function getZ() {
    const re = parseFloat(document.getElementById("re").value) || 0;
    const im = parseFloat(document.getElementById("im").value) || 0;
    return { re, im };
}

function show(text) {
    const out = document.getElementById("out");
    out.innerHTML = text;
    out.style.display = "block";
}

function calc(type) {
    const z = getZ();
    let res = "";

    if (type === "conj") {
        res = `<code>${z.re} ${z.im >= 0 ? "-" : "+"} ${Math.abs(z.im)}i</code>`;
    }
    if (type === "mod") {
        const m = Math.hypot(z.re, z.im).toFixed(4);
        res = `<code>|z| = ${m}</code>`;
    }
    if (type === "arg") {
        const a = (Math.atan2(z.im, z.re) * 180 / Math.PI).toFixed(2);
        res = `<code>θ = ${a}°</code>`;
    }
    show(res);
}

function polarToRect() {
    const r = parseFloat(document.getElementById("r").value) || 0;
    const t = parseFloat(document.getElementById("theta").value) || 0;
    const rad = t * Math.PI / 180;
    const x = (r * Math.cos(rad)).toFixed(4);
    const y = (r * Math.sin(rad)).toFixed(4);
    show(`<code>${x} + ${y}i</code>`);
}

function clearAll() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("out").style.display = "none";
}
</script>

<footer>© 2026 p-Ur-z · Flux v1.3 · Pure HTML / CSS / JS</footer>

</body>
</html>
