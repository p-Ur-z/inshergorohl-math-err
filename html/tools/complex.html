<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>复数运算</title>
    <link rel="stylesheet" href="../styles/body.css" />
    <link rel="stylesheet" href="../styles/headline.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/input_row.css" />
    <link rel="stylesheet" href="../styles/input.css" />
    <link rel="stylesheet" href="../styles/button.css" />
    <link rel="stylesheet" href="../styles/textarea.css" />
    <link rel="stylesheet" href="../styles/result.css" />
    <link rel="stylesheet" href="../styles/back.css" />
    <link rel="stylesheet" href="../styles/lable.css" />
  </head>
  <body>
    <div class="vscode-layout">
      <div class="activity-bar">
        <div class="activity-item active" data-menu="complex">
          <img src="../icons/calculator.svg" alt="四则运算" />
        </div>
        <div class="activity-item" data-menu="props">
          <img src="../icons/property.svg" alt="属性" />
        </div>
      </div>

      <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
          <div class="sidebar-title">复数运算</div>
          <div class="sidebar-item active" data-menu="complex">
            <img src="../icons/calculator.svg" alt="" />
            <span>四则运算</span>
          </div>
          <div class="sidebar-item" data-menu="props">
            <img src="../icons/property.svg" alt="" />
            <span>复数属性</span>
          </div>
        </div>
      </div>

      <div class="main-panel">
        <div id="content-complex" class="content-card">
          <h2>复数四则运算 \(z_1 \oplus z_2\)</h2>
          <div class="input-row">
            <textarea id="complexA" placeholder="输入复数 z₁ (格式: a,b)">
1,2</textarea
            >
            <textarea id="complexB" placeholder="输入复数 z₂ (格式: c,d)">
3,-1</textarea
            >
          </div>
          <select id="op">
            <option value="+">加法 (+)</option>
            <option value="-">减法 (-)</option>
            <option value="*">乘法 (×)</option>
            <option value="/">除法 (÷)</option>
            <option value="^">幂运算 (^)</option>
          </select>
          <button onclick="calcComplex()">计算</button>
          <div id="complex_result" class="result"></div>
        </div>

        <div id="content-props" class="content-card" style="display: none">
          <h2>复数属性 \(|z|\) 和 \(\arg(z)\)</h2>
          <textarea id="prop_input" placeholder="输入复数 (格式: a,b)">
3,4</textarea
          >
          <button onclick="calcProps()">计算属性</button>
          <div id="prop_result" class="result"></div>
        </div>
      </div>
    </div>

    <a class="back" href="../index.html">返回主页</a>

    <script src="../scripts/complex.js"></script>
    <script src="../scripts/menu.js"></script>
    <script src="../scripts/mathjax-config.js"></script>
    <script>
      function calcComplex() {
        try {
          const z1 = parseComplex(document.getElementById("complexA").value);
          const z2 = parseComplex(document.getElementById("complexB").value);
          const op = document.getElementById("op").value;
          const result = computeComplex(z1, z2, op);
          document.getElementById("complex_result").innerHTML =
            `\\(z_1 = ${z1.toString()}\\)<br>` +
            `\\(z_2 = ${z2.toString()}\\)<br>` +
            `结果 = ${result.toString()}`;
          if (window.MathJax) MathJax.typesetPromise();
        } catch (e) {
          document.getElementById("complex_result").innerHTML =
            "error: " + e.message;
        }
      }

      function calcProps() {
        try {
          const z = parseComplex(document.getElementById("prop_input").value);
          const { modulus, argument } = computeProps(z);
          document.getElementById("prop_result").innerHTML =
            `\\(z = ${z.toString()}\\)<br>` +
            `模长 \\(|z| = ${modulus.toFixed(4)}\\)<br>` +
            `辐角 \\(\\arg(z) = ${argument.toFixed(2)}^\\circ\\)`;
          if (window.MathJax) MathJax.typesetPromise();
        } catch (e) {
          document.getElementById("prop_result").innerHTML =
            "错误: " + e.message;
        }
      }
    </script>
  </body>
</html>
