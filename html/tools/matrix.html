<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>线性代数</title>
    <link rel="stylesheet" href="../styles/body.css" />
    <link rel="stylesheet" href="../styles/headline.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/textarea.css" />
    <link rel="stylesheet" href="../styles/button.css" />
    <link rel="stylesheet" href="../styles/result.css" />
    <link rel="stylesheet" href="../styles/input_row.css" />
    <link rel="stylesheet" href="../styles/back.css" />
    <link rel="stylesheet" href="../styles/lable.css" />
    <link rel="stylesheet" href="../styles/toggle.css" />
  </head>
  <body>
    <h1>线性代数</h1>

    <div class="grid">
      <div class="card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>LU 分解</h2>
          <span class="toggle-icon"
            ><img src="../icons/expand.svg" alt="展开" width="20" height="20"
          /></span>
        </div>
        <div class="card-content">
          <textarea id="lu_input">2 1\n1 2</textarea>
          <button onclick="calcLU()">计算 LU</button>
          <div id="lu_result" class="result"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>QR 分解</h2>
          <span class="toggle-icon"
            ><img src="../icons/expand.svg" alt="展开" width="20" height="20"
          /></span>
        </div>
        <div class="card-content">
          <textarea id="qr_input">1 1\n1 0\n0 1</textarea>
          <button onclick="calcQR()">计算 QR</button>
          <div id="qr_result" class="result"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>SVD 分解</h2>
          <span class="toggle-icon"
            ><img src="../icons/expand.svg" alt="展开" width="20" height="20"
          /></span>
        </div>
        <div class="card-content">
          <textarea id="svd_input">1 0\n0 2</textarea>
          <button onclick="calcSVD()">计算 SVD</button>
          <div id="svd_result" class="result"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>矩阵幂</h2>
          <span class="toggle-icon"
            ><img src="../icons/expand.svg" alt="展开" width="20" height="20"
          /></span>
        </div>
        <div class="card-content">
          <textarea id="pow_input">2 0\n0 2</textarea>
          <input id="pow_n" type="number" value="-1" />
          <button onclick="calcPow()">计算 Aⁿ</button>
          <div id="pow_result" class="result"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>行列式</h2>
          <span class="toggle-icon"
            ><img src="../icons/expand.svg" alt="展开" width="20" height="20"
          /></span>
        </div>
        <div class="card-content">
          <textarea id="det_input">1 2\n3 4</textarea>
          <button onclick="calcDet()">计算行列式</button>
          <div id="det_result" class="result"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>矩阵乘法</h2>
          <span class="toggle-icon"
            ><img src="../icons/expand.svg" alt="展开" width="20" height="20"
          /></span>
        </div>
        <div class="card-content">
          <div class="input-row">
            <textarea id="matA">1 2\n3 4</textarea>
            <textarea id="matB">5 6\n7 8</textarea>
          </div>
          <button onclick="calcMul()">计算 A × B</button>
          <div id="mul_result" class="result"></div>
        </div>
      </div>
    </div>

    <script src="../scripts/toggle.js"></script>
    <script src="../scripts/linear.js"></script>
    <script src="../scripts/mathjax-config.js"></script>
    <script>
      function calcLU() {
        const A = getMatrix("lu_input");
        const { L, U } = computeLU(A);
        document.getElementById("lu_result").innerHTML =
          "L =\n" + printMatrix(L) + "\nU =\n" + printMatrix(U);
      }
      function calcQR() {
        const A = getMatrix("qr_input");
        const { Q, R } = computeQR(A);
        document.getElementById("qr_result").innerHTML =
          "Q =\n" + printMatrix(Q) + "\nR =\n" + printMatrix(R);
      }
      function calcSVD() {
        const A = getMatrix("svd_input");
        const result = computeSVD(A);
        document.getElementById("svd_result").innerHTML = result;
      }
      function calcPow() {
        const A = getMatrix("pow_input");
        const n = parseInt(document.getElementById("pow_n").value);
        const result = computePow(A, n);
        if (result.error) {
          document.getElementById("pow_result").innerHTML = result.error;
        } else {
          document.getElementById("pow_result").innerHTML =
            "Aⁿ =\n" + printMatrix(result);
        }
      }
      function calcDet() {
        const A = getMatrix("det_input");
        const det = computeDet(A);
        if (det.error) {
          document.getElementById("det_result").innerHTML = det.error;
        } else {
          document.getElementById("det_result").innerHTML =
            "行列式 = " + det.toFixed(4);
        }
      }
      function calcMul() {
        const A = getMatrix("matA");
        const B = getMatrix("matB");
        const C = computeMul(A, B);
        if (C.error) {
          document.getElementById("mul_result").innerHTML = C.error;
        } else {
          document.getElementById("mul_result").innerHTML =
            "A × B =\n" + printMatrix(C);
        }
      }
    </script>

    <a class="back" href="../index.html">返回主页</a>
  </body>
</html>
