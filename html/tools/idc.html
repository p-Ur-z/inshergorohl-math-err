<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蒙特卡洛积分</title>
    <link rel="stylesheet" href="../styles/body.css" />
    <link rel="stylesheet" href="../styles/headline.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/input.css" />
    <link rel="stylesheet" href="../styles/button.css" />
    <link rel="stylesheet" href="../styles/result.css" />
    <link rel="stylesheet" href="../styles/back.css" />
    <link rel="stylesheet" href="../styles/toggle.css" />
  </head>

  <body>
    <h1>蒙特卡洛积分</h1>

    <div class="card">
      <div class="card-header" onclick="toggleCard(this)">
        <h2>蒙特卡洛积分 \(\int_{\Omega} f(x,y,z) \, d\Omega\)</h2>
        <span class="toggle-icon">
          <img src="../icons/expand.svg" alt="展开" width="20" height="20" />
        </span>
      </div>
      <div class="card-content">
        <label>被积函数 \(f(x, y, z)\)</label>
        <input id="func" value="x*x + y*y + z*z" />

        <label>积分区域</label>
        <select id="region">
          <option value="circle">圆形区域 x² + y² ≤ R²</option>
          <option value="ellipse">椭圆区域 x²/a² + y²/b² ≤ 1</option>
          <option value="cylinder">圆柱体 x² + y² ≤ R², z ∈ [z₀, z₁]</option>
          <option value="sphere">球体 x² + y² + z² ≤ R²</option>
        </select>

        <label>R</label>
        <input type="number" id="R" value="1" step="0.1" />

        <label>a</label>
        <input type="number" id="a" value="2" step="0.1" />

        <label>b</label>
        <input type="number" id="b" value="1" step="0.1" />

        <label>\(z_0\)</label>
        <input type="number" id="z0" value="0" step="0.1" />

        <label>\(z_1\)</label>
        <input type="number" id="z1" value="1" step="0.1" />

        <button onclick="compute()">开始计算</button>

        <div class="result" id="result">点击"开始计算"查看结果</div>
      </div>
    </div>

    <script src="../scripts/toggle.js"></script>
    <script src="../scripts/montecarlo.js"></script>
    <script src="../scripts/mathjax-config.js"></script>
    <script>
      function compute() {
        const fExpr = document.getElementById("func").value;
        const region = document.getElementById("region").value;
        const R = Number(document.getElementById("R").value);
        const a = Number(document.getElementById("a").value);
        const b = Number(document.getElementById("b").value);
        const z0 = Number(document.getElementById("z0").value);
        const z1 = Number(document.getElementById("z1").value);
        const N = 800000;

        const resultDiv = document.getElementById("result");
        resultDiv.textContent = "计算中...";

        setTimeout(() => {
          const res = monteCarloIntegral(fExpr, region, R, a, b, z0, z1, N);

          if (res.error) {
            resultDiv.textContent = "函数解析错误：" + res.error;
            return;
          }

          const regionName =
            document.getElementById("region").options[
              document.getElementById("region").selectedIndex
            ].text;
          resultDiv.innerHTML =
            `计算结果<br>` +
            `采样点数：${res.N.toLocaleString()}<br>` +
            `有效样本：${res.inside.toLocaleString()} (${((res.inside / res.N) * 100).toFixed(1)}%)<br>` +
            `积分结果：${res.result.toFixed(8)}<br>` +
            `区域：${regionName}`;
        }, 50);
      }
    </script>

    <a class="back" href="../index.html">返回主页</a>
  </body>
</html>
