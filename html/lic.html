<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {

* { box-sizing: border-box; }

body {

}

header {

}

.subtitle {

.card {

    padding: 28px;
    margin-bottom: 24px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    font-size: 14px;
}

button {
    background: var(--gradient);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 10px;
    background: #f0f9ff;
    border: 1px solid #bfdbfe;
    font-size: 14px;
}

footer {
    text-align: center;
    margin-top: 60px;
    font-size: 13px;
    color: var(--sub);
}
</style>
</head>
