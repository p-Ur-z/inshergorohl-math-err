<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lic · 数值积分</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a1a1a;
    --sub: #5a6b82;
    --line: #d1d9e6;
    --blue: #3b82f6;
    --gradient: linear-gradient(90deg, #3b82f6, #8b5cf6);
}

* { box-sizing: border-box; }

body {
    margin: 0 auto;
    max-width: 820px;
    padding: 40px 24px;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 36px;
}

.back {
    font-size: 14px;
    color: var(--sub);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
}

h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
}

.subtitle {
    font-size: 13px;
    color: var(--sub);
}

.card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--line);
    padding: 28px;
    margin-bottom: 24px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
}

button {
    background: var(--gradient);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
}

button:hover {
    opacity: 0.9;
}

.result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 10px;
    background: #f0f9ff;
    border: 1px solid #bfdbfe;
    font-size: 14px;
    line-height: 1.6;
}

footer {
    text-align: center;
    margin-top: 60px;
    font-size: 13px;
    color: var(--sub);
}
</style>
</head>

<body>

<header>
    <div>
        <a href="index.html" class="back">← 返回主页</a>
        <h1>Lic · 数值积分</h1>
        <div class="subtitle">黎曼和估算，输入函数与区间，快速得到近似结果。</div>
    </div>
</header>

<div class="card">
    <input id="func" type="text" placeholder="函数 f(x)，例如：x^2 + sin(x)">
    <input id="start" type="number" placeholder="起始值 a">
    <input id="end" type="number" placeholder="结束值 b">
    <select id="method">
        <option value="left">左黎曼和</option>
        <option value="right">右黎曼和</option>
        <option value="mid">中点黎曼和</option>
    </select>
    <button onclick="calculate()">计算积分</button>
    <div id="out" class="result" style="display:none;"></div>
</div>

<footer>© 2026 p-Ur-z · Flux v1.3 · Pure HTML / CSS / JS</footer>

<script>
function calculate() {
    const funcInput = document.getElementById('func').value;
    const a = parseFloat(document.getElementById('start').value);
    const b = parseFloat(document.getElementById('end').value);
    const method = document.getElementById('method').value;
    const n = 10000; // 采样点数
    const dx = (b - a) / n;
    let sum = 0;

    // 安全评估函数
    function f(x) {
        try {
            // 替换常见数学函数
            let expr = funcInput
                .replace(/sin\(/g, 'Math.sin(')
                .replace(/cos\(/g, 'Math.cos(')
                .replace(/tan\(/g, 'Math.tan(')
                .replace(/log\(/g, 'Math.log(')
                .replace(/sqrt\(/g, 'Math.sqrt(')
                .replace(/pow\(/g, 'Math.pow(')
                .replace(/pi/g, 'Math.PI')
                .replace(/e/g, 'Math.E');
            return eval(expr.replace(/x/g, `(${x})`));
        } catch (e) {
            return NaN;
        }
    }

    for (let i = 0; i < n; i++) {
        let x;
        if (method === 'left') {
            x = a + i * dx;
        } else if (method === 'right') {
            x = a + (i + 1) * dx;
        } else { // mid
            x = a + (i + 0.5) * dx;
        }
        const fx = f(x);
        if (isNaN(fx)) {
            document.getElementById('out').innerHTML = '<span style="color:#ef4444;">函数解析错误，请检查输入。</span>';
            document.getElementById('out').style.display = 'block';
            return;
        }
        sum += fx * dx;
    }

    const out = document.getElementById('out');
    out.style.display = 'block';
    out.innerHTML = `<strong>近似结果：</strong> ${sum.toFixed(8)}`;
}

// ===== 最恨：点击一次即封锁 =====
(function () {
    const MIN = 1;
    const BLOCKED_PAGE = 'blocked.html';

    let count = parseInt(localStorage.getItem('flux_click_count'));
    if (isNaN(count)) {
        count = 1;
        localStorage.setItem('flux_click_count', count);
    }

    if (count < MIN || localStorage.getItem('flux_blocked') === 'true') {
        localStorage.setItem('flux_blocked', 'true');
        window.location.href = BLOCKED_PAGE;
    }

    document.addEventListener('click', function () {
        count--;
        localStorage.setItem('flux_click_count', count);
        if (count < MIN) {
            localStorage.setItem('flux_blocked', 'true');
            alert('⚠️ 点击次数已耗尽！\n访问已被阻断。');
            window.location.href = BLOCKED_PAGE;
        }
    });
})();
</script>

</body>
</html>
