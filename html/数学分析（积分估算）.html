<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>数学分析（积分估算）</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
.card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
h2 { margin-top: 0; color: #1e293b; }
input, select { padding: 8px; margin: 5px; border: 1px solid #cbd5e1; border-radius: 4px; width: 120px; }
button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
.result { margin-top: 15px; padding: 10px; background: #f1f5f9; border-radius: 4px; font-size: 16px; word-wrap: break-word; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
</style>
</head>
<body>

<h1>数学分析 · 积分估算</h1>

<div class="grid">

<!-- 1. 定积分 -->
<div class="card">
<h2>定积分 ∫ f(x) dx</h2>
<input id="f1" value="Math.sin(x)">
<input id="a1" value="0" size="8"> ~ <input id="b1" value="3.14159" size="8">
<input id="n1" value="200">
<select id="m1">
<option value="left">左黎曼和</option>
<option value="right">右黎曼和</option>
<option value="mid">中点黎曼和</option>
<option value="trapezoid">梯形法</option>
<option value="parabola">抛物线法</option>
</select>
<button onclick="calc1()">计算</button>
<div class="result" id="r1"></div>
</div>

<!-- 2. 二重积分 -->
<div class="card">
<h2>二重积分 ∬ f(x,y) dxdy</h2>
<input id="f2" value="x*x+y*y">
<div>
<input id="x1" value="0" size="5">~<input id="x2" value="1" size="5">
<input id="y1" value="0" size="5">~<input id="y2" value="1" size="5">
</div>
<input id="n2" value="60">
<select id="m2">
<option value="left">左黎曼和</option>
<option value="right">右黎曼和</option>
<option value="mid">中点黎曼和</option>
<option value="trapezoid">梯形法</option>
<option value="parabola">抛物线法</option>
</select>
<button onclick="calc2()">计算</button>
<div class="result" id="r2"></div>
</div>

<!-- 3. 曲线积分 -->
<div class="card">
<h2>曲线积分</h2>
<input id="cx" value="Math.cos(t)">
<input id="cy" value="Math.sin(t)">
<input id="t0" value="0" size="8"> ~ <input id="t1" value="6.28318" size="8">
<input id="nc" value="400">
<select id="ct">
<option value="I">I 类（标量）</option>
<option value="II">II 类（向量）</option>
</select>
<button onclick="calcC()">计算</button>
<div class="result" id="rc"></div>
</div>

<!-- 4. 三重积分 -->
<div class="card">
<h2>三重积分 ∭ f(x,y,z) dxdydz</h2>
<input id="f3" value="x+y+z">
<div>
<input id="tx0" value="0" size="5">~<input id="tx1" value="1" size="5">
<input id="ty0" value="0" size="5">~<input id="ty1" value="1" size="5">
<input id="tz0" value="0" size="5">~<input id="tz1" value="1" size="5">
</div>
<input id="n3" value="40">
<select id="m3">
<option value="left">左黎曼和</option>
<option value="right">右黎曼和</option>
<option value="mid">中点黎曼和</option>
<option value="trapezoid">梯形法</option>
<option value="parabola">抛物线法</option>
</select>
<button onclick="calc3()">计算</button>
<div class="result" id="r3"></div>
</div>

</div>

<script>
const run = (e,v)=>Function(...Object.keys(v),`return ${e}`)(...Object.values(v));

/* 通用 1D */
function integrate1D(f, a, b, n, mode){
    const h=(b-a)/n; let s=0;
    if(mode==="left"){for(let i=0;i<n;i++)s+=f(a+i*h);s*=h;}
    if(mode==="right"){for(let i=1;i<=n;i++)s+=f(a+i*h);s*=h;}
    if(mode==="mid"){for(let i=0;i<n;i++)s+=f(a+(i+0.5)*h);s*=h;}
    if(mode==="trapezoid"){s=0.5*(f(a)+f(b));for(let i=1;i<n;i++)s+=f(a+i*h);s*=h;}
    if(mode==="parabola"){s=f(a)+f(b);for(let i=1;i<n;i++)s+=f(a+i*h)*(i%2?4:2);s*=h/3;}
    return s;
}

function calc1(){ const f=x=>run(f1.value,{x}); r1.innerText=integrate1D(f,+a1.value,+b1.value,+n1.value,m1.value); }

/* 二重 */
function calc2(){
    const f=(x,y)=>run(f2.value,{x,y});
    const [x1,x2,y1,y2,n]=[+x1.value,+x2.value,+y1.value,+y2.value,+n2.value];
    const hx=(x2-x1)/n, hy=(y2-y1)/n; let s=0;
    for(let i=0;i<n;i++)for(let j=0;j<n;j++)s+=f(x1+(i+0.5)*hx,y1+(j+0.5)*hy);
    r2.innerText=s*hx*hy;
}

/* 曲线 */
function calcC(){
    const x=t=>run(cx.value,{t}), y=t=>run(cy.value,{t});
    const [t0,t1,n]=[+t0.value,+t1.value,+nc.value];
    const dt=(t1-t0)/n; let s=0;
    for(let i=0;i<n;i++){
        const t=t0+i*dt;
        const dx=x(t+dt)-x(t), dy=y(t+dt)-y(t);
        s+= ct.value==="I" ? Math.hypot(dx,dy) : x(t)*dy-y(t)*dx;
    }
    rc.innerText=s;
}

/* 三重 */
function calc3(){
    const f=(x,y,z)=>run(f3.value,{x,y,z});
    const [x0,x1,y0,y1,z0,z1,n]=[+tx0.value,+tx1.value,+ty0.value,+ty1.value,+tz0.value,+tz1.value,+n3.value];
    const hx=(x1-x0)/n,hy=(y1-y0)/n,hz=(z1-z0)/n; let s=0;
    for(let i=0;i<n;i++)for(let j=0;j<n;j++)for(let k=0;k<n;k++)
        s+=f(x0+(i+0.5)*hx,y0+(j+0.5)*hy,z0+(k+0.5)*hz);
    r3.innerText=s*hx*hy*hz;
}
</script>

</body>
</html>
