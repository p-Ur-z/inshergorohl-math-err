<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux v1.3</title>
    <style>
        /* --- 字体与全局变量 --- */
        :root {
            --bg: #ffffff;
            --text-primary: #111111;
            --text-secondary: #6b6b6b;
            --text-tertiary: #a0a0a0;
            --border: #f0f0f0;
            --accent: #111111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- 容器：极窄版心 --- */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        /* --- 头部 --- */
        header {
            margin-bottom: 80px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 40px;
        }

        .logo {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1.5px; /* 紧缩字间距，显精致 */
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .version {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* --- 列表：无卡片化 --- */
        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* --- 列表项：像表格一样干净 --- */
        .tool-item {
            display: grid;
            grid-template-columns: 1fr auto; /* 两列布局：左文字，右链接 */
            align-items: center;
            padding: 28px 0;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s ease;
        }

        .tool-item:hover {
            background-color: #fafafa; /* 极淡的背景变化 */
        }

        /* 图标隐藏或极小化，靠文字撑场面 */
        .tool-icon {
            display: none; /* 去掉图标，更纯净 */
        }

        .tool-info h2 {
            font-size: 17px;
            font-weight: 500; /* 中等字重，不抢眼 */
            margin-bottom: 4px;
        }

        .tool-info p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* --- 链接样式 --- */
        .tool-link {
            font-size: 14px;
            color: var(--text-tertiary);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            white-space: nowrap;
            margin-left: 20px;
        }

        .tool-link:hover {
            color: var(--text-primary);
            border-color: #d0d0d0;
            background-color: #fff;
        }

        /* --- 禁用状态 --- */
        .tool-item.disabled .tool-info p {
            color: var(--text-tertiary);
        }

        .tool-item.disabled .tool-link {
            background: var(--border);
            border-color: transparent;
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        /* --- 页脚 --- */
        footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-tertiary);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">Flux Math Toolkit</div>
            <h1>Flux v1.3</h1>
            <p class="version">Pure HTML / CSS / JS · 2024 – 2026</p>
        </header>

        <main class="tool-list">
            
            <!-- 工具 1 -->
            <div class="tool-item">
                <div class="tool-info">
                    <h2>Lik · 数值积分</h2>
                    <p>黎曼和估算，输入函数与区间，快速得到近似结果。</p>
                </div>
                <a href="#" class="tool-link">打开工具</a>
            </div>

            <!-- 工具 2 -->
            <div class="tool-item">
                <div class="tool-info">
                    <h2>Matrix · 线性代数</h2>
                    <p>行列式、逆矩阵、秩，告别繁琐手算。</p>
                </div>
                <a href="#" class="tool-link">打开工具</a>
            </div>

            <!-- 工具 3 -->
            <div class="tool-item">
                <div class="tool-info">
                    <h2>ldc · 蒙特卡洛积分</h2>
                    <p>圆、球、复杂区域积分，随机撒点法。</p>
                </div>
                <a href="#" class="tool-link">打开工具</a>
            </div>

            <!-- 工具 4 (开发中) -->
            <div class="tool-item disabled">
                <div class="tool-info">
                    <h2>Complex · 复数计算</h2>
                    <p>支持复数的加减乘除、共轭、模长及极坐标转换。</p>
                </div>
                <div class="tool-link">Coming Soon</div>
            </div>

        </main>

        <footer>
            <p>© 2024 – 2026 p-Ur-z</p>
        </footer>
    </div>

</body>
</html>
