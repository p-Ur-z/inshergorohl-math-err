<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Math Toolkit v1.3</title>
    <style>
        /* --- 基础重置与全局样式 --- */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --text-main: #2b2d42;
            --text-secondary: #6c757d;
            --shadow: rgba(0, 0, 0, 0.05);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* --- 主容器 --- */
        .container {
            width: 100%;
            max-width: 1000px;
        }

        /* --- 头部 Header --- */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .version {
            display: inline-block;
            background: #e9ecef;
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* --- 卡片网格 Grid --- */
        .grid {
            display: grid;
            /* 在大屏幕上一行两列，小屏幕自动适应 */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* --- 单个卡片 Card --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 4px 6px var(--shadow);
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        /* 禁用状态的卡片 */
        .card.disabled {
            opacity: 0.7;
            background: #f8f9fa;
        }
        
        .card.disabled:hover {
            transform: none;
            box-shadow: 0 4px 6px var(--shadow);
        }

        /* --- 卡片内容排版 --- */
        .card-icon {
            width: 50px;
            height: 50px;
            background: #eef2ff;
            color: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .card p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1; /* 让文字撑满空间，使按钮始终贴底 */
        }

        .card-link {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s ease;
            text-align: center;
        }

        .card-link:hover {
            background: var(--primary-hover);
        }

        .disabled-tag {
            display: inline-block;
            background: #dee2e6;
            color: #6c757d;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            cursor: not-allowed;
        }

        /* --- 页脚 Footer --- */
        footer {
            text-align: center;
            margin-top: 60px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo">FLUX</div>
            <h1>Math Toolkit</h1>
            <span class="version">v1.3 正式版</span>
        </header>

        <!-- 主体网格 -->
        <main class="grid">
            
            <!-- 卡片 1: 数值积分 -->
            <div class="card">
                <div class="card-icon">∫</div>
                <h2>Lik · 数值积分</h2>
                <p>黎曼和估算，输入函数与区间，快速得到近似结果。</p>
                <a href="#" class="card-link">打开工具</a>
            </div>

            <!-- 卡片 2: 线性代数 -->
            <div class="card">
                <div class="card-icon">Matrix</div>
                <h2>Linear Algebra</h2>
                <p>行列式、逆矩阵、秩，告别繁琐手算。</p>
                <a href="#" class="card-link">打开工具</a>
            </div>

            <!-- 卡片 3: 蒙特卡洛积分 -->
            <div class="card">
                <div class="card-icon">Ω</div>
                <h2>ldc · 蒙特卡洛积分</h2>
                <p>圆、球、复杂区域积分，随机撒点法。</p>
                <a href="#" class="card-link">打开工具</a>
            </div>

            <!-- 卡片 4: 开发中 (禁用状态) -->
            <div class="card disabled">
                <div class="card-icon">ℂ</div>
                <h2>Complex · 复数计算</h2>
                <p>支持复数的加减乘除、共轭、模长及极坐标转换，后期更出幂运算。</p>
                <div class="disabled-tag">Coming Soon</div>
            </div>

        </main>

        <!-- 页脚 -->
        <footer>
            <p>© 2024 – 2026 p-Ur-z · Flux v1.3 · Pure HTML / CSS / JS</p>
        </footer>
    </div>

</body>
</html>
